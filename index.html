<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squadmakers - 3D Technical Challenge</title>
  </head>
  <body>
    <div
      id="ui-panel"
      style="
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.85);
        padding: 15px;
        border-radius: 8px;
        color: white;
        font-family: sans-serif;
        border: 1px solid #444;
        width: 220px;
        max-height: 90vh;
        overflow-y: auto;
      "
    >
      <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #444;">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #4caf50;">Model Visibility</h3>
        <label style="display: block; cursor: pointer; font-size: 13px; margin-bottom: 5px;">
          <input type="checkbox" id="toggleModel1" checked> Grey Model (OBJ 1)
        </label>
        <label style="display: block; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="toggleModel2" checked> Blue Model (OBJ 2)
        </label>
      </div>

      <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #4caf50;">New Entity</h3>
      <div style="margin-bottom: 8px">
        <label style="font-size: 12px">X Coordinate: </label>
        <input type="number" id="posX" value="0" style="width: 100%; box-sizing: border-box; background: #222; color: white; border: 1px solid #555; padding: 4px; margin-top: 2px;" />
      </div>
      <div style="margin-bottom: 8px">
        <label style="font-size: 12px">Y Coordinate: </label>
        <input type="number" id="posY" value="0" style="width: 100%; box-sizing: border-box; background: #222; color: white; border: 1px solid #555; padding: 4px; margin-top: 2px;" />
      </div>
      <div style="margin-bottom: 12px">
        <label style="font-size: 12px">Z Coordinate: </label>
        <input type="number" id="posZ" value="0" style="width: 100%; box-sizing: border-box; background: #222; color: white; border: 1px solid #555; padding: 4px; margin-top: 2px;" />
      </div>
      
      <button
        id="btnCreate"
        style="
          width: 100%;
          padding: 10px;
          cursor: pointer;
          background: #4caf50;
          color: white;
          border: none;
          border-radius: 4px;
          font-weight: bold;
          margin-bottom: 15px;
        "
      >
        Add Entity
      </button>

      <div style="border-top: 1px solid #444; padding-top: 10px;">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #4caf50;">Entity List</h3>
        <ul id="entityList" style="padding: 0; list-style: none; margin: 0; font-size: 11px;">
          </ul>
      </div>
    </div>

    <div id="mouseCoords" style="position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 10px; font-family: monospace; pointer-events: none; border: 1px solid #00ff00; border-radius: 4px;">
      UTM Mouse: (0, 0, 0)
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
